function resumenMetas(metas){

function pmt(fv, months, annualRate) {

  return fv*r/((Math.pow(1+r,months)-1));
}

// FV of monthly contributions
function fv(monthly, months, annualRate) {
  const r=annualRate/100/12;
  return monthly*((Math.pow(1+r,months)-1)/r);
}

function MetaCard({meta, onChange, onRemove, canRemove}) {
  const costo=parseFloat(meta.costo)||0;
  const meses=parseInt(meta.meses)||0;
  const mensual = costo&&meses ? Math.ceil(costo/meses) : 0;
  const tipoColors={corto:C.teal,mediano:C.lilac,largo:C.gold};
  const c=tipoColors[meta.tipo];
  return (
    <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid "+c+"30",borderRadius:12,padding:14,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <input value={meta.nombre} onChange={e=>onChange("nombre",e.target.value)} placeholder="¿Cuál es tu meta? (ej: viaje a Europa, casa propia…)"
          style={{flex:1,background:"transparent",border:"none",outline:"none",color:"#f5f0ff",fontFamily:"Montserrat,sans-serif",fontSize:13,fontWeight:600}}/>
        {canRemove&&<button onClick={onRemove} style={{background:"none",border:"none",color:"#5a4d6e",cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 4px"}}>×</button>}
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <div style={{flex:"1 1 120px"}}>
          <p style={{margin:"0 0 4px",fontSize:9,color:"#7a6d90",textTransform:"uppercase",letterSpacing:.5}}>¿Cuánto cuesta? $</p>
          <input type="number" min="0" value={meta.costo} onChange={e=>onChange("costo",e.target.value)} placeholder="12.000.000"
            style={{width:"100%",background:"rgba(0,0,0,0.22)",border:"1px solid rgba(107,75,138,0.2)",borderRadius:8,padding:"8px 10px",color:C.peach,fontFamily:"Montserrat,sans-serif",fontSize:13,fontWeight:700,outline:"none"}}/>
        </div>
        <div style={{flex:"1 1 100px"}}>
          <p style={{margin:"0 0 4px",fontSize:9,color:"#7a6d90",textTransform:"uppercase",letterSpacing:.5}}>¿En cuántos meses?</p>
          <input type="number" min="1" value={meta.meses} onChange={e=>onChange("meses",e.target.value)} placeholder="24"
            style={{width:"100%",background:"rgba(0,0,0,0.22)",border:"1px solid rgba(107,75,138,0.2)",borderRadius:8,padding:"8px 10px",color:C.peach,fontFamily:"Montserrat,sans-serif",fontSize:13,fontWeight:700,outline:"none"}}/>
        </div>
        {mensual>0&&(
          <div style={{flex:"1 1 120px",background:c+"15",border:"1px solid "+c+"30",borderRadius:8,padding:"8px 10px",display:"flex",flexDirection:"column",justifyContent:"center"}}>
            <p style={{margin:"0 0 1px",fontSize:9,color:c,textTransform:"uppercase",letterSpacing:.5}}>Necesitas al mes</p>
            <p style={{margin:0,fontSize:14,fontWeight:700,color:c}}>{fmt(mensual)}</p>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [step,setStep]     = useState(1);
  const [reg,setReg]       = useState({nombre:"",apellido:"",email:"",indicativo:"+57",celular:""});
  const [errors,setErrors] = useState({});
  const [submitting,setSub]= useState(false);
  const [metas,setMetas]   = useState({
    corto:[newMeta("corto"),newMeta("corto")],
    mediano:[newMeta("mediano")],
    largo:[newMeta("largo")],
  });
  const [gastos,setGastos]     = useState("");
  const [edadActual,setEdad]   = useState("");
  const [edadRetiro,setRetiro] = useState("");
  const [gastosRetiro,setGR]   = useState("");
  const [tasaR,setTasaR]       = useState(10);
  const [patrimonioActual,setPA] = useState("");

  const setF=(k,v)=>setReg(p=>({...p,[k]:v}));

  const validate=()=>{
    const e={};
    if(!reg.nombre.trim()) e.nombre=1;
    if(!reg.apellido.trim()) e.apellido=1;
    if(!reg.email.includes("@")||!reg.email.includes(".")) e.email=1;
    if(reg.celular.replace(/\D/g,"").length<6) e.celular=1;
    setErrors(e);
    return !Object.keys(e).length;
  };

  const handleReg=()=>{
    if(!validate()) return;
    setSub(true);
    submitGF({etapa:"registro",nombre:reg.nombre,apellido:reg.apellido,email:reg.email,celular:reg.indicativo+" "+reg.celular});
    setTimeout(()=>{setSub(false);setStep(2);},900);
  };

  const handleFinal=()=>{
    submitGF({
      etapa:"completo",
      nombre:reg.nombre, apellido:reg.apellido, email:reg.email, celular:reg.indicativo+" "+reg.celular,
      gastosMensuales:gastos, patrimonioActual:patrimonioActual,
      metasResumen:resumenMetas(metas), ahorroMensualMetas:totalMensualMetas,
      montoLibertad:Math.round(libertadNum), pctLibertad:Math.round(pctLibertad),
      edadActual:edadActual, edadRetiro:edadRetiro, gastosRetiro:gastosRetiro, tasaRentabilidad:tasaR,
      ahorroMensualRetiro:Math.round(mensualRetiro), totalInversionRetiro:Math.round(totalInvRetiro),
    });
    setStep(4);
  };

  const updMeta=(tipo,id,k,v)=>setMetas(m=>({...m,[tipo]:m[tipo].map(x=>x.id===id?{...x,[k]:v}:x)}));
  const addMeta=(tipo)=>setMetas(m=>({...m,[tipo]:[...m[tipo],newMeta(tipo)]}));
  const rmMeta=(tipo,id)=>setMetas(m=>({...m,[tipo]:m[tipo].filter(x=>x.id!==id)}));

  const allMetas=[...metas.corto,...metas.mediano,...metas.largo].filter(m=>parseFloat(m.costo)>0&&parseInt(m.meses)>0);
  const totalMensualMetas=allMetas.reduce((s,m)=>s+Math.ceil(parseFloat(m.costo)/(parseInt(m.meses)||1)),0);

  const g=parseFloat(gastos)||0;
  const libertadNum=g*12*25;
  const pa=parseFloat(patrimonioActual)||0;
  const pctLibertad=libertadNum>0?Math.min((pa/libertadNum)*100,100):0;
  const niveles=[
    {l:"Seguridad financiera",pct:20,desc:"Fondo de autonomía + inversiones que cubren gastos básicos",c:C.teal},
    {l:"Independencia financiera",pct:60,desc:"Inversiones cubren todos tus gastos básicos",c:C.lilac},
    {l:"Libertad financiera total",pct:100,desc:"Inversiones cubren tu estilo de vida completo",c:C.gold},
  ];

  const ea=parseInt(edadActual)||0;
  const er=parseInt(edadRetiro)||0;
  const gr=parseFloat(gastosRetiro)||0;
  const mesesParaRetiro=(er-ea)*12;
  const totalNecesitaRetiro=gr>0&&er>ea ? gr*12*Math.max(85-er,10) : 0;
  const yaAhorrado=pa;
  const faltaRetiro=Math.max(totalNecesitaRetiro-yaAhorrado,0);
  const mensualRetiro=mesesParaRetiro>0&&faltaRetiro>0 ? pmt(faltaRetiro,mesesParaRetiro,tasaR) : 0;

            <p style={{margin:"0 0 22px",color:"#a89bc2",fontSize:13,lineHeight:1.7}}>Esta es la sesión final. Hoy construyes tu plan de vida financiero personal.</p>
            {[{k:"nombre",l:"Nombre *",p:"Tu nombre",t:"text"},{k:"apellido",l:"Apellido *",p:"Tu apellido",t:"text"},{k:"email",l:"Correo electrónico *",p:"hola@ejemplo.com",t:"email"}].map(({k,l,p,t})=>(
              <div key={k} style={{marginBottom:13}}>
                <label style={LBL(errors[k])}>{l}</label>
                <input type={t} value={reg[k]} onChange={e=>setF(k,e.target.value)} placeholder={p} style={IS(errors[k])}/>

            <div style={{marginBottom:20}}>

              <div style={{display:"flex",gap:8}}>
                <select value={reg.indicativo} onChange={e=>setF("indicativo",e.target.value)} style={{padding:"12px 8px",borderRadius:10,border:"1px solid rgba(107,75,138,0.28)",background:"rgba(255,255,255,0.05)",color:"#f5f0ff",fontFamily:"Montserrat,sans-serif",fontSize:13,outline:"none",flexShrink:0,width:150,cursor:"pointer"}}>
                  {PAISES.map(p=><option key={p.code+p.name} value={p.code}>{p.flag} {p.code} {p.name}</option>)}
                </select>
                <input type="tel" value={reg.celular} onChange={e=>setF("celular",e.target.value)} placeholder="300 123 4567" style={{...IS(errors.celular),flex:1,width:"auto"}}/>

              {errors.celular&&<p style={{margin:"3px 0 0",fontSize:10,color:C.peach}}>Ingresa un número válido</p>}

            <button onClick={handleReg} disabled={submitting} style={BTN(submitting?"rgba(107,75,138,0.4)":C.plum)}>
              {submitting?"Guardando...":"Empezar mi plan de vida financiero →"}
            </button>

          </div>

        {/* ── PASO 2: METAS ── */}
        {step===2&&(
          <div>

                    {pa>=0&&(

                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:11}}>
                          <span style={{color:"#7a6d90"}}>Camino a la libertad total</span>
                          <span style={{color:C.gold,fontWeight:700}}>{pctLibertad.toFixed(1)}%</span>

              <div style={{marginBottom:12}}>
                <p style={{margin:"0 0 5px",fontSize:10,color:C.lilac,textTransform:"uppercase",letterSpacing:.5,fontWeight:700}}>¿Cuánto necesitas al mes durante el retiro? $</p>
                {numIn(gastosRetiro,setGR,"3.000.000")}
              </div>

              <div style={{marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <p style={{margin:0,fontSize:10,color:C.lilac,textTransform:"uppercase",letterSpacing:.5,fontWeight:700}}>Tasa anual estimada de inversión</p>
                  <span style={{fontSize:14,fontWeight:700,color:C.peach}}>{tasaR}%</span>
                </div>
                <input type="range" min="4" max="18" step="0.5" value={tasaR} onChange={e=>setTasaR(Number(e.target.value))} style={sliderStyle}/>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
                  <span style={{fontSize:9,color:"#5a4d6e"}}>4% (CDT)</span>
                  <span style={{fontSize:9,color:"#5a4d6e"}}>18% (alto riesgo)</span>
                </div>
              </div>

              {totalNecesitaRetiro>0&&(
                <div>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
                    {[
                      {l:"Tiempo para invertir",v:(er-ea)+" años",c:C.teal},
                      {l:"Total que necesitas",v:fmtB(totalNecesitaRetiro),c:C.lilac},
                      {l:"Ya tienes",v:fmtB(pa),c:C.gold},
                    ].map(({l,v,c})=>(
                      <div key={l} style={{flex:"1 1 130px",background:"rgba(0,0,0,0.22)",borderRadius:10,padding:12,border:"1px solid "+c+"25",textAlign:"center"}}>
                        <p style={{margin:"0 0 2px",fontSize:9,color:"#5a4d6e",textTransform:"uppercase",letterSpacing:.5}}>{l}</p>
                        <p style={{margin:0,fontSize:14,fontWeight:700,color:c}}>{v}</p>
                      </div>
                    ))}
                  </div>
                  {mensualRetiro>0&&(
                    <div style={{padding:16,borderRadius:12,background:"rgba(206,162,221,0.12)",border:"1px solid rgba(206,162,221,0.3)",textAlign:"center"}}>
                      <p style={{margin:"0 0 4px",fontSize:11,color:C.lilac,textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>Necesitas invertir al mes para tu retiro</p>
                      <p style={{margin:"0 0 4px",fontSize:32,fontWeight:700,color:C.lilac}}>{fmt(mensualRetiro)}</p>
                      <p style={{margin:0,fontSize:11,color:"#7a6d90"}}>Empezando hoy, con {tasaR}% anual durante {er-ea} años</p>
                    </div>
                  )}
                </div>
              )}
            </div>

            <button onClick={handleFinal} style={BTN()}>Ver mi hoja de ruta →</button>
            <button onClick={()=>setStep(2)} style={BACK()}>← Ajustar mis metas</button>
          </div>
        )}

        {/* ── PASO 4: HOJA DE RUTA ── */}
        {step===4&&(
          <div>
            <h2 style={{margin:"0 0 5px",fontSize:21,fontWeight:700}}>Tu hoja de ruta, {reg.nombre} 🗺️</h2>
            <p style={{margin:"0 0 22px",color:"#a89bc2",fontSize:13,lineHeight:1.7}}>Un plan escrito tiene el doble de probabilidades de cumplirse que uno que solo existe en la cabeza. Este es el tuyo.</p>

            {/* RESUMEN DE METAS */}
            {allMetas.length>0&&(
              <div style={card()}>
                <p style={{margin:"0 0 14px",fontSize:13,fontWeight:700,color:"#f5f0ff"}}>🎯 Tus metas y lo que necesitas al mes</p>
                {["corto","mediano","largo"].map(tipo=>{
                  const ms=metas[tipo].filter(m=>parseFloat(m.costo)>0&&parseInt(m.meses)>0);
                  if(!ms.length) return null;
                  const labels={corto:"Corto plazo",mediano:"Mediano plazo",largo:"Largo plazo"};
                  const colors={corto:C.teal,mediano:C.lilac,largo:C.gold};
                  return(
                    <div key={tipo} style={{marginBottom:14}}>
                      <p style={{margin:"0 0 8px",fontSize:10,fontWeight:700,color:colors[tipo],textTransform:"uppercase",letterSpacing:1}}>{labels[tipo]}</p>
                      {ms.map(m=>{
                        const mensual=Math.ceil(parseFloat(m.costo)/(parseInt(m.meses)||1));
                        return(
                          <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                            <div>
                              <p style={{margin:"0 0 1px",fontSize:13,color:"#d4c8ee",fontWeight:600}}>{m.nombre||"Meta sin nombre"}</p>
                              <p style={{margin:0,fontSize:11,color:"#5a4d6e"}}>{fmt(parseFloat(m.costo))} en {m.meses} meses</p>
                            </div>
                            <span style={{fontSize:13,fontWeight:700,color:colors[tipo]}}>{fmt(mensual)}/mes</span>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
                {totalMensualMetas>0&&(
                  <div style={{paddingTop:12,borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:13,color:"#a89bc2",fontWeight:600}}>Total metas</span>
                    <span style={{fontSize:16,fontWeight:700,color:C.gold}}>{fmt(totalMensualMetas)}/mes</span>
                  </div>
                )}
              </div>
            )}

            {/* NÚMERO DE LIBERTAD */}
            {g>0&&(
              <div style={{...card("rgba(240,192,64,0.3)"),background:"rgba(240,192,64,0.06)"}}>
                <p style={{margin:"0 0 14px",fontSize:13,fontWeight:700,color:C.gold}}>🔑 Tu número de libertad financiera</p>
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  {[
                    {l:"Gastos al mes",v:fmt(g),c:"#a89bc2"},
                    {l:"Tu número de libertad",v:fmtB(libertadNum),c:C.gold},
                    {l:"Ya tienes",v:fmtB(pa),c:C.teal},
                  ].map(({l,v,c})=>(
                    <div key={l} style={{flex:"1 1 130px",background:"rgba(0,0,0,0.2)",borderRadius:10,padding:11,textAlign:"center",border:"1px solid "+c+"20"}}>
                      <p style={{margin:"0 0 2px",fontSize:9,color:"#5a4d6e",textTransform:"uppercase",letterSpacing:.5}}>{l}</p>
                      <p style={{margin:0,fontSize:13,fontWeight:700,color:c}}>{v}</p>
                    </div>
                  ))}
                </div>
                {g>0&&libertadNum>0&&(
                  <div style={{marginTop:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:5}}>
                      <span style={{color:"#7a6d90"}}>Tu camino a la libertad financiera</span>
                      <span style={{color:C.gold,fontWeight:700}}>{pctLibertad.toFixed(1)}% completado</span>
                    </div>
                    <div style={{height:8,borderRadius:4,background:"rgba(255,255,255,0.06)",overflow:"hidden"}}>
                      <div style={{height:"100%",width:Math.min(pctLibertad,100)+"%",background:"linear-gradient(90deg,"+C.teal+","+C.gold+")",borderRadius:4}}/>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* RETIRO */}
            {mensualRetiro>0&&(
              <div style={{...card("rgba(206,162,221,0.3)"),background:"rgba(206,162,221,0.06)"}}>
                <p style={{margin:"0 0 14px",fontSize:13,fontWeight:700,color:C.lilac}}>🌅 Tu plan de retiro</p>
                <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}}>
                  {[
                    {l:"Me retiro a los",v:edadRetiro+" años",c:C.lilac},
                    {l:"Necesito ahorrar al mes",v:fmt(mensualRetiro),c:C.peach},
                    {l:"Total que necesito",v:fmtB(totalNecesitaRetiro),c:C.gold},
                  ].map(({l,v,c})=>(
                    <div key={l} style={{flex:"1 1 130px",background:"rgba(0,0,0,0.2)",borderRadius:10,padding:11,textAlign:"center",border:"1px solid "+c+"20"}}>
                      <p style={{margin:"0 0 2px",fontSize:9,color:"#5a4d6e",textTransform:"uppercase",letterSpacing:.5}}>{l}</p>
                      <p style={{margin:0,fontSize:13,fontWeight:700,color:c}}>{v}</p>
                    </div>
                  ))}
                </div>
                <p style={{margin:0,fontSize:12,color:"#a89bc2",lineHeight:1.6}}>
                  La diferencia entre empezar hoy y esperar 10 años no es lineal. El interés compuesto trabaja exponencialmente — cada año que pasa, el costo de esperar aumenta.
                </p>
              </div>
            )}

            {/* LAS 4 ACCIONES */}
            <div style={{...card(C.plum+"45"),background:C.plum+"10"}}>
              <p style={{margin:"0 0 14px",fontSize:13,fontWeight:700,color:C.lilac}}>📍 Las 4 acciones que cambian todo este mes</p>
              {[
                {n:1,e:"🔍",t:"Cierra las fugas",d:"Revisa tus gastos del último mes y detecta tres categorías donde estás gastando más de lo planeado. Una sola acción de recorte puede liberar "+fmt(totalMensualMetas>0?Math.round(totalMensualMetas*0.3):200000)+" al mes."},
                {n:2,e:"🛡️",t:"Fortalece tu fondo para la autonomía",d:g>0?"Tu meta es llegar a "+fmtB(g*12*3)+" como mínimo (3 meses de gastos). Ese fondo es lo que te permite tomar decisiones desde la calma, no desde el miedo.":"Define cuánto necesitas al mes y calcula tu fondo ideal. Sin ese colchón, cualquier imprevisto puede desbaratarte el plan."},
                {n:3,e:"💳",t:"Ataca tu deuda más costosa",d:"Identifica la deuda con la tasa más alta y destínale todo el extra que puedas este mes. Cada peso que pagas de interés es un peso que no trabaja para tu futuro."},
                {n:4,e:"📈",t:mensualRetiro>0?"Automatiza "+fmt(Math.min(mensualRetiro,totalMensualMetas||mensualRetiro))+" en inversiones":"Abre tu primera inversión",d:mensualRetiro>0?"Configura una transferencia automática el día que te paguen. Lo que no ves, no lo gastas. Empieza con lo que puedas sostener, aunque sea la mitad de la meta.":"Elige un instrumento para tu perfil (CDT, fondo o ETF) y haz tu primera inversión este mes. El monto no importa tanto como el hábito."},
              ].map(({n,e,t,d})=>(
                <div key={n} style={{display:"flex",gap:12,marginBottom:14,paddingBottom:14,borderBottom:n<4?"1px solid rgba(255,255,255,0.06)":"none"}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:C.plum,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                    <span style={{fontSize:13}}>{e}</span>
                  </div>
                  <div>
                    <p style={{margin:"0 0 3px",fontSize:13,color:"#d4c8ee",fontWeight:700}}>{t}</p>
                    <p style={{margin:0,fontSize:12,color:"#a89bc2",lineHeight:1.7}}>{d}</p>
                  </div>
                </div>
              ))}
            </div>

            {/* CUÁNDO REVISAR */}
            <div style={card("rgba(74,124,126,0.3)")}>
              <p style={{margin:"0 0 14px",fontSize:13,fontWeight:700,color:C.teal}}>🔄 Cuándo volver a revisar este plan</p>
              {[
                {e:"💰",t:"Cambia tu ingreso",d:"Aumento, pérdida de trabajo, nuevo negocio — cualquier cambio relevante amerita actualizar los montos."},
                {e:"🏆",t:"Logras una meta",d:"Cada vez que marcas una meta como cumplida, es momento de definir la siguiente. El plan siempre tiene que tener horizonte."},
                {e:"👨‍👩‍👧",t:"Cambia tu familia o tus responsabilidades",d:"Nueva persona a cargo, separación, herencia, mudanza — cualquier cambio de vida es un cambio financiero."},
                {e:"📅",t:"Una vez al año, sin importar qué",d:"La revisión anual de tus finanzas es tan importante como la revisión médica anual. No esperes a que algo salga mal."},
              ].map(({e,t,d})=>(
                <div key={t} style={{display:"flex",gap:10,marginBottom:11,paddingBottom:11,borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                  <span style={{fontSize:17,flexShrink:0,marginTop:1}}>{e}</span>
                  <div>
                    <p style={{margin:"0 0 2px",fontSize:13,color:"#d4c8ee",fontWeight:600}}>{t}</p>
                    <p style={{margin:0,fontSize:12,color:"#a89bc2",lineHeight:1.6}}>{d}</p>
                  </div>
                </div>
              ))}
            </div>

            {/* CIERRE */}
            <div style={{textAlign:"center",padding:28,background:"rgba(107,75,138,0.1)",borderRadius:16,border:"1px solid rgba(107,75,138,0.2)",marginBottom:18}}>
              <p style={{margin:"0 0 12px",fontSize:22}}>🎉</p>
              <p style={{margin:"0 0 8px",fontSize:18,fontWeight:700,color:C.lilac}}>Terminaste el ciclo completo</p>
              <p style={{margin:"0 0 16px",fontSize:13,color:"#a89bc2",lineHeight:1.8,maxWidth:480,marginLeft:"auto",marginRight:"auto"}}>
                Cuatro sesiones. Un diagnóstico, un fondo para la autonomía, un plan para salir de deudas, una estrategia de inversión y ahora una hoja de ruta propia. No importa de dónde partiste. Lo que importa es que ya tienes un plan — y eso ya te pone por delante del 80%.
              </p>
              <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
                <button onClick={()=>setStep(2)} style={{padding:"10px 20px",borderRadius:10,background:"transparent",border:"1px solid "+C.plum,color:C.lilac,fontFamily:"Montserrat,sans-serif",fontSize:12,fontWeight:600,cursor:"pointer"}}>← Ajustar mis metas</button>
                <button onClick={()=>setStep(3)} style={{padding:"10px 20px",borderRadius:10,background:"transparent",border:"1px solid "+C.teal,color:C.teal,fontFamily:"Montserrat,sans-serif",fontSize:12,fontWeight:600,cursor:"pointer"}}>← Mi número</button>
              </div>
            </div>
            <p style={{textAlign:"center",fontSize:10,color:"#3d3050"}}>FEMINARIO · En alianza con <span style={{color:C.davi,fontWeight:700}}>DAVIVIENDA</span> · Las proyecciones son estimaciones educativas, no asesoría financiera profesional.</p>
          </div>
        )}

      </div>
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

</script>
</body>
</html>
